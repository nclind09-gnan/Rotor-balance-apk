name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install system dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip python3-pip \
            autoconf libtool pkg-config zlib1g-dev libncurses-dev cmake \
            libffi-dev libssl-dev automake build-essential libltdl-dev

      - name: Install buildozer and dependencies
        run: |
          pip3 install --upgrade pip
          pip3 install buildozer cython==0.29.36

      - name: Build with Buildozer
        env:
          JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
        run: |
          buildozer android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: rotor-balance-apk
          path: bin/*.apk
